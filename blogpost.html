<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Blog Post</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="bg-primary text-white text-center p-5">
      <h1>Blogpost page</h1>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">My Website</a>

        <div>
          <a href="about.html" class="btn btn-outline-light me-2">About</a>
          <a href="contact.html" class="btn btn-outline-light me-2">Contact</a>
          <a href="login.html" class="btn btn-outline-light me-2">Login</a>
          <a href="signup.html" class="btn btn-primary">Sign Up</a>
        </div>
      </div>
    </nav>
    <div class="container mt-5" style="max-width: 700px">
      <h1 class="text-center mb-4">Create Blog Post</h1>

      <form>
        <div class="mb-3">
          <label class="form-label">Post Title</label>
          <input
            type="text"
            class="form-control"
            placeholder="Enter blog title"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Author Name</label>
          <input
            type="text"
            class="form-control"
            placeholder="Enter author name"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Category</label>
          <select class="form-select">
            <option selected>Select category</option>
            <option>Technology</option>
            <option>Education</option>
            <option>Business</option>
            <option>Sports</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Upload Image</label>
          <input type="file" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">Blog Content</label>
          <textarea
            class="form-control"
            rows="6"
            placeholder="Write your blog post here..."
          ></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Publish Post
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="index.html" class="btn btn-dark"> Back Home </a>
      </div>
    </div>
  </body>
</html>
