<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="text-white text-center py-3" style="background-color: #2c3136">
      <h1 class="h3 m-0">Contact Page</h1>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">My Website</a>

        <div>
          <a href="about.html" class="btn btn-outline-light me-2">About</a>
          <a href="contact.html" class="btn btn-outline-light me-2">Contact</a>
          <a href="blogpost.html" class="btn btn-outline-light me-2"
            >Blogpost</a
          >
          <a href="login.html" class="btn btn-outline-light me-2">Login</a>
          <a href="signup.html" class="btn btn-primary">Sign Up</a>
        </div>
      </div>
    </nav>
    <div class="container mt-5">
      <h1>Contact Us</h1>

      <form>
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea class="form-control" rows="4"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>

      <a href="index.html" class="btn btn-dark mt-3">Back Home</a>
    </div>
  </body>
</html>
